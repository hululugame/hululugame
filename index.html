<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://i.ibb.co/b5JhtfwB/IMG-5571.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/b5JhtfwB/IMG-5571.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="呼嚕嚕代儲">
<meta name="theme-color" content="#0f172a">

<style>

html{scroll-behavior:smooth;}

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

/* 星空煙火背景 */

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

header{padding:40px 20px;}
h1{margin:0;font-size:28px;}
.subtitle{color:#94a3b8;margin-top:6px;}

input{
width:85%;
padding:14px;
border-radius:12px;
border:none;
margin-top:20px;
font-size:16px;
outline:none;
transition:0.3s;
}

input:focus{
box-shadow:0 0 15px #3b82f6;
transform:scale(1.02);
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
color:black;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
transition:0.3s;
position:relative;
animation:cardFade .6s ease;
}

.card:hover{
transform:scale(1.06);
box-shadow:0 0 25px rgba(37,99,235,0.8);
}

.card.active{
outline:3px solid #3b82f6;
box-shadow:0 0 30px rgba(59,130,246,0.9);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

.hot{
position:absolute;
background:#ef4444;
color:white;
font-size:12px;
padding:4px 8px;
border-radius:8px;
top:8px;
left:8px;
font-weight:bold;
}

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.price span:last-child{color:#2563eb;}

.trust{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.trust div{
background:#1e293b;
padding:14px;
border-radius:10px;
font-size:14px;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:20px 34px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
animation:pulse 2s infinite;
width:130px;
text-align:center;
}

.ig{
position:fixed;
bottom:90px;
right:20px;
background:#e1306c;
padding:20px 34px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
animation:pulse 2s infinite;
width:130px;
text-align:center;
}

.bubble{
position:fixed;
bottom:160px;
right:20px;
background:white;
color:black;
padding:12px 16px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
font-size:14px;
max-width:200px;
}

.top{
position:fixed;
bottom:220px;
right:20px;
background:#3b82f6;
color:white;
padding:12px 16px;
border-radius:50px;
text-decoration:none;
font-size:14px;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.marquee{
width:100%;
background:linear-gradient(90deg,#2563eb,#4f46e5);
color:white;
padding:14px 0;
overflow:hidden;
white-space:nowrap;
font-size:16px;
font-weight:bold;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:marquee 16s linear infinite;
}

@keyframes marquee{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.notice{margin-top:20px;color:#94a3b8;}
.counter{margin-top:20px;font-size:13px;color:#94a3b8;}
.no-result{margin-top:20px;color:#94a3b8;display:none;}

@keyframes cardFade{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.site-logo{
position:fixed;
bottom:20px;
left:20px;
width:250px;
z-index:10;
filter: drop-shadow(0 0 10px rgba(255,200,0,0.8));
}
