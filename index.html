<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:35px 20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
color:#94a3b8;
margin-top:5px;
}

.search-box{
width:85%;
margin:20px auto;
display:flex;
}

.search-box input{
flex:1;
padding:14px;
border-radius:10px 0 0 10px;
border:none;
font-size:16px;
}

.search-box button{
background:#3b82f6;
border:none;
color:white;
padding:14px 18px;
border-radius:0 10px 10px 0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section-title{
margin:30px 0 10px;
font-size:20px;
font-weight:bold;
}

.games{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.game-card{
background:white;
color:black;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.game-card:hover{
transform:scale(1.05);
}

.game-card img{
width:100%;
height:120px;
object-fit:cover;
}

.game-title{
padding:12px;
font-weight:bold;
text-align:center;
}

.products{
display:none;
margin-top:20px;
}

.product{
background:white;
color:black;
border-radius:10px;
padding:15px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.buy-btn{
background:#3b82f6;
color:white;
padding:8px 14px;
border-radius:8px;
font-size:14px;
}

.notice{
text-align:center;
margin-top:20px;
color:#94a3b8;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
color:white;
padding:14px 22px;
border-radius:40px;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<h1>🎮 呼嚕嚕手遊代儲</h1>
<div class="subtitle">安全 · 快速 · 即時儲值</div>

<div class="search-box">
<input id="search" placeholder="搜尋遊戲">
<button>🔍</button>
</div>

</header>

<div class="container">

<div class="section-title">🔥 熱門遊戲</div>

<div class="games" id="games">

<div class="game-card" data-name="原神 genshin" onclick="showGame('genshin')">
<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/990080/capsule_616x353.jpg">
<div class="game-title">原神</div>
</div>

<div class="game-card" data-name="崩壞 星穹鐵道 honkai star rail" onclick="showGame('starrail')">
<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1817070/capsule_616x353.jpg">
<div class="game-title">崩壞：星穹鐵道</div>
</div>

<div class="game-card" data-name="apex" onclick="showGame('apex')">
<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1172470/capsule_616x353.jpg">
<div class="game-title">APEX</div>
</div>

<div class="game-card" data-name="lol league of legends" onclick="showGame('lol')">
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ahri_0.jpg">
<div class="game-title">LOL</div>
</div>

</div>


<div id="genshin" class="products">

<div class="section-title">原神價目表</div>

<div class="product">
<span>60晶石</span>
<span>$30</span>
</div>

<div class="product">
<span>300晶石</span>
<span>$140</span>
</div>

<div class="product">
<span>980晶石</span>
<span>$400</span>
</div>

<div class="product">
<span>1980晶石</span>
<span>$760</span>
</div>

</div>


<div id="starrail" class="products">

<div class="section-title">崩壞：星穹鐵道</div>

<div class="product">
<span>60星瓊</span>
<span>$30</span>
</div>

<div class="product">
<span>300星瓊</span>
<span>$140</span>
</div>

<div class="product">
<span>980星瓊</span>
<span>$400</span>
</div>

</div>


<div id="apex" class="products">

<div class="section-title">APEX</div>

<div class="product">
<span>1000金幣</span>
<span>$220</span>
</div>

<div class="product">
<span>2150金幣</span>
<span>$420</span>
</div>

</div>


<div id="lol" class="products">

<div class="section-title">LOL</div>

<div class="product">
<span>375聯盟幣</span>
<span>$150</span>
</div>

<div class="product">
<span>610聯盟幣</span>
<span>$230</span>
</div>

</div>

<div class="notice">
✨價格每日浮動，依照官方當天報價為主✨
</div>

</div>


<a class="line" href="https://line.me/ti/p/YOURID">LINE客服</a>


<script>

function showGame(id){

let products=document.querySelectorAll(".products")

products.forEach(p=>p.style.display="none")

document.getElementById(id).style.display="block"

}


document.getElementById("search").addEventListener("input",function(){

let text=this.value.toLowerCase()

let games=document.querySelectorAll(".game-card")

games.forEach(game=>{

let name=game.dataset.name.toLowerCase()

if(name.includes(text) || text===""){
game.style.display="block"
}else{
game.style.display="none"
}

})

})

</script>

</body>
</html>
