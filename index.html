<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
margin:0;
font-size:30px;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

input{
width:85%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
color:black;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

.price:hover{
background:#e2e8f0;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:14px 22px;
border-radius:50px;
color:white;
text-decoration:none;
font-size:16px;
}

.notice{
margin-top:20px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<h1>🎮 呼嚕嚕手遊代儲</h1>
<div class="subtitle">安全 · 快速 · 即時儲值</div>

<input id="search" placeholder="搜尋遊戲">

</header>


<div class="container">

<div class="grid" id="games">


<div class="card" data-name="原神 genshin" onclick="showGame('genshin')">

<img src="https://images.launchbox-app.com/6a9a2a40-7c2d-4e36-9c39-7f6f7a0d1e1e.jpg">

<div class="card-title">原神</div>

</div>


<div class="card" data-name="崩壞 崩鐵 崩壞星穹鐵道 starrail" onclick="showGame('starrail')">

<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1817070/header.jpg">

<div class="card-title">崩壞星穹鐵道</div>

</div>


<div class="card" data-name="apex" onclick="showGame('apex')">

<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1172470/header.jpg">

<div class="card-title">APEX</div>

</div>


<div class="card" data-name="lol league 英雄聯盟" onclick="showGame('lol')">

<img src="https://cmsassets.rgpub.io/sanity/images/dsfx7636/news_live/ee5e1fa89bbf908db8b27c12075b1219777084ff-1920x1080.jpg">

<div class="card-title">LOL</div>

</div>


</div>


<div id="genshin" class="prices">

<h3>原神</h3>

<div class="price" data-game="原神" data-item="60晶石" data-price="30">
<span>60晶石</span><span>$30</span>
</div>

<div class="price" data-game="原神" data-item="300晶石" data-price="140">
<span>300晶石</span><span>$140</span>
</div>

<div class="price" data-game="原神" data-item="980晶石" data-price="400">
<span>980晶石</span><span>$400</span>
</div>

<div class="price" data-game="原神" data-item="1980晶石" data-price="760">
<span>1980晶石</span><span>$760</span>
</div>

<div class="price" data-game="原神" data-item="6480晶石" data-price="2170">
<span>6480晶石</span><span>$2170</span>
</div>

</div>


<div id="starrail" class="prices">

<h3>崩壞星穹鐵道</h3>

<div class="price" data-game="崩鐵" data-item="60星瓊" data-price="30">
<span>60星瓊</span><span>$30</span>
</div>

<div class="price" data-game="崩鐵" data-item="300星瓊" data-price="140">
<span>300星瓊</span><span>$140</span>
</div>

<div class="price" data-game="崩鐵" data-item="980星瓊" data-price="400">
<span>980星瓊</span><span>$400</span>
</div>

<div class="price" data-game="崩鐵" data-item="1980星瓊" data-price="760">
<span>1980星瓊</span><span>$760</span>
</div>

</div>


<div id="apex" class="prices">

<h3>APEX</h3>

<div class="price" data-game="APEX" data-item="1000金幣" data-price="220">
<span>1000金幣</span><span>$220</span>
</div>

<div class="price" data-game="APEX" data-item="2150金幣" data-price="420">
<span>2150金幣</span><span>$420</span>
</div>

</div>


<div id="lol" class="prices">

<h3>LOL</h3>

<div class="price" data-game="LOL" data-item="375聯盟幣" data-price="150">
<span>375聯盟幣</span><span>$150</span>
</div>

<div class="price" data-game="LOL" data-item="610聯盟幣" data-price="230">
<span>610聯盟幣</span><span>$230</span>
</div>

</div>


<div class="notice">
✨價格每日浮動，依照官方當天報價為主✨
</div>

</div>


<a class="line" href="https://line.me/ti/p/YOURID">LINE客服</a>


<script>

function showGame(id){

let all=document.querySelectorAll(".prices")

all.forEach(a=>a.style.display="none")

document.getElementById(id).style.display="block"

}



let input=document.getElementById("search")

input.addEventListener("input",function(){

let text=input.value.toLowerCase()

let cards=document.querySelectorAll(".card")

let prices=document.querySelectorAll(".prices")

prices.forEach(p=>{
p.style.display="none"
})

cards.forEach(card=>{

let name=card.dataset.name.toLowerCase()

card.style.display =
name.includes(text) ? "block" : "none"

})

})



let price=document.querySelectorAll(".price")

price.forEach(p=>{

p.onclick=function(){

let game=this.dataset.game
let item=this.dataset.item
let price=this.dataset.price

let message=
"我要儲值\n"+
"遊戲："+game+"\n"+
"面額："+item+"\n"+
"價格："+price

let url="https://line.me/R/msg/text/?"+encodeURIComponent(message)

window.open(url)

}

})

</script>

</body>
</html>
