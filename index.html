@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}

.marquee{

background:linear-gradient(90deg,#2563eb,#4f46e5);
color:white;
padding:14px 0;
overflow:hidden;
white-space:nowrap;
font-size:16px;

}

.marquee span{

100%{transform:translateX(-100%);}
}

.counter{margin-top:20px;font-size:13px;color:#94a3b8;}
.no-result{margin-top:20px;color:#94a3b8;display:none;}

@keyframes cardFade{

@keyframes hotGlow{
