<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

input{
width:85%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
color:black;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:14px 22px;
border-radius:50px;
color:white;
text-decoration:none;
}

.notice{
margin-top:20px;
color:#94a3b8;
}

/* 跑馬燈 */

.marquee{
width:100%;
background:#2563eb;
color:white;
padding:10px 0;
overflow:hidden;
white-space:nowrap;
font-size:14px;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:marquee 18s linear infinite;
}

@keyframes marquee{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

</style>

</head>


<body>

<!-- 跑馬燈公告 -->

<div class="marquee">
<span>
🔥公告：代儲皆為人工儲值｜請準備遊戲UID｜價格每日浮動｜LINE客服24小時在線🔥
</span>
</div>


<header>

<h1>🎮 呼嚕嚕手遊代儲</h1>
<div class="subtitle">安全 · 快速 · 即時儲值</div>

<input id="search" placeholder="搜尋遊戲">

</header>


<div class="container">

<div class="grid" id="games">

<div class="card" data-name="原神">

<img src="https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg">

<div class="card-title">原神</div>

</div>

<div class="card" data-name="崩壞星穹鐵道">

<img src="https://upload.wikimedia.org/wikipedia/zh/1/11/Honkai%EF%BC%9AStar_Rail%E5%B4%A9%E5%A3%9E%EF%BC%9A%E6%98%9F%E7%A9%B9%E9%90%B5%E9%81%93.png">

<div class="card-title">崩壞星穹鐵道</div>

</div>

<div class="card" data-name="Apex">

<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1172470/header.jpg">

<div class="card-title">APEX</div>

</div>

<div class="card" data-name="LOL">

<img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/League_of_Legends_2019_vector.svg">

<div class="card-title">LOL</div>

</div>

</div>


<!-- 原神價目 -->

<div class="prices" id="price0">

<h3>原神</h3>

<div class="price"><span>60晶石</span><span>$30</span></div>
<div class="price"><span>300晶石</span><span>$140</span></div>
<div class="price"><span>980晶石</span><span>$400</span></div>

</div>


<!-- 崩壞價目 -->

<div class="prices" id="price1">

<h3>崩壞星穹鐵道</h3>

<div class="price"><span>60星瓊</span><span>$30</span></div>
<div class="price"><span>300星瓊</span><span>$140</span></div>

</div>


<!-- Apex價目 -->

<div class="prices" id="price2">

<h3>APEX</h3>

<div class="price"><span>1000金幣</span><span>$220</span></div>
<div class="price"><span>2150金幣</span><span>$420</span></div>

</div>


<!-- LOL價目 -->

<div class="prices" id="price3">

<h3>LOL</h3>

<div class="price"><span>375聯盟幣</span><span>$150</span></div>
<div class="price"><span>610聯盟幣</span><span>$230</span></div>

</div>


<div class="notice">
✨價格每日浮動，依照官方當天報價為主✨
</div>

</div>


<a class="line" href="https://line.me/ti/p/YOURID">LINE客服</a>


<script>

const cards=document.querySelectorAll(".card")
const prices=document.querySelectorAll(".prices")

// 點遊戲顯示價目

cards.forEach((card,i)=>{

card.onclick=function(){

prices.forEach(p=>p.style.display="none")

prices[i].style.display="block"

}

})


// 搜尋

const search=document.getElementById("search")

search.addEventListener("input",function(){

let text=this.value.toLowerCase()

prices.forEach(p=>p.style.display="none")

cards.forEach(card=>{

let name=card.dataset.name.toLowerCase()

if(name.startsWith(text) || text===""){
card.style.display="block"
}else{
card.style.display="none"
}

})

})

</script>

</body>
</html>
