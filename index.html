<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>

<style>

html{
scroll-behavior:smooth;
}

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

input{
width:85%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
outline:none;
transition:0.2s;
}

input:focus{
box-shadow:0 0 10px #3b82f6;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
color:black;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
transition:0.25s;
position:relative;
animation:fadeIn 0.8s ease;
}

.grid .card:nth-child(1){animation-delay:0.1s}
.grid .card:nth-child(2){animation-delay:0.2s}
.grid .card:nth-child(3){animation-delay:0.3s}
.grid .card:nth-child(4){animation-delay:0.4s}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(37,99,235,0.7);
}

.card.active{
outline:3px solid #3b82f6;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

.hot{
position:absolute;
background:#ef4444;
color:white;
font-size:12px;
padding:4px 8px;
border-radius:8px;
top:8px;
left:8px;
font-weight:bold;
}

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
animation:fadePrice 0.4s ease;
}

@keyframes fadePrice{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.price:hover{
background:#e2e8f0;
transform:scale(1.02);
}

.price span:last-child{
color:#2563eb;
}

.trust{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.trust div{
background:#1e293b;
padding:14px;
border-radius:10px;
font-size:14px;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:20px 34px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
animation:pulse 2s infinite;
}

/* 新增 IG 客服 */

.ig{
position:fixed;
bottom:90px;
right:20px;
background:#e1306c;
padding:20px 34px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.top{
position:fixed;
bottom:160px;
right:20px;
background:#3b82f6;
color:white;
padding:12px 16px;
border-radius:50px;
text-decoration:none;
font-size:14px;
box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

.notice{
margin-top:20px;
color:#94a3b8;
}

.marquee{
width:100%;
background:linear-gradient(90deg,#2563eb,#4f46e5);
color:white;
padding:14px 0;
overflow:hidden;
white-space:nowrap;
font-size:16px;
font-weight:bold;
letter-spacing:1px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:marquee 16s linear infinite;
}

@keyframes marquee{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.no-result{
display:none;
margin-top:20px;
color:#94a3b8;
font-size:14px;
}

.counter{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

</style>

</head>

<body>

<a id="top"></a>

<div class="marquee">
<span>
🔥公告：代儲皆為人工儲值｜請準備遊戲UID｜價格每日浮動｜LINE客服24小時在線🔥
</span>
</div>

<header>

<h1>🎮 呼嚕嚕手遊代儲</h1>
<div class="subtitle">安全 · 快速 · 即時儲值</div>

<input id="search" placeholder="搜尋遊戲">

</header>

<div class="container">

<div class="grid" id="games">

<div class="card" data-name="原神">
<div class="hot">HOT</div>
<img src="https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg">
<div class="card-title">原神</div>
</div>

<div class="card" data-name="崩壞星穹鐵道">
<div class="hot">HOT</div>
<img src="https://upload.wikimedia.org/wikipedia/zh/1/11/Honkai%EF%BC%9AStar_Rail%E5%B4%A9%E5%A3%9E%EF%BC%9A%E6%98%9F%E7%A9%B9%E9%90%B5%E9%81%93.png">
<div class="card-title">崩壞星穹鐵道</div>
</div>

<div class="card" data-name="Apex">
<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1172470/header.jpg">
<div class="card-title">APEX</div>
</div>

<div class="card" data-name="LOL">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/League_of_Legends_2019_vector.svg">
<div class="card-title">LOL</div>
</div>

</div>

<div class="no-result" id="noResult">
找不到這個遊戲
</div>

<div class="prices" id="price0">
<h3>原神</h3>
<div class="price"><span>60晶石</span><span>$30</span></div>
<div class="price"><span>300晶石</span><span>$140</span></div>
<div class="price"><span>980晶石</span><span>$400</span></div>
</div>

<div class="prices" id="price1">
<h3>崩壞星穹鐵道</h3>
<div class="price"><span>60星瓊</span><span>$30</span></div>
<div class="price"><span>300星瓊</span><span>$140</span></div>
</div>

<div class="prices" id="price2">
<h3>APEX</h3>
<div class="price"><span>1000金幣</span><span>$220</span></div>
<div class="price"><span>2150金幣</span><span>$420</span></div>
</div>

<div class="prices" id="price3">
<h3>LOL</h3>
<div class="price"><span>375聯盟幣</span><span>$150</span></div>
<div class="price"><span>610聯盟幣</span><span>$230</span></div>
</div>

<div class="notice">
✨價格每日浮動，依照官方當天報價為主✨
</div>

<div class="trust">
<div>🔒 官方匯率代儲</div>
<div>⚡ 人工快速儲值</div>
<div>💬 LINE即時客服</div>
<div>🕒 24小時服務</div>
</div>

<div class="counter" id="stayTime"></div>

</div>

<a class="top" href="#top">⬆</a>

<a class="ig" href="https://lihi2.cc/b4tEh">IG客服</a>

<a class="line" href="https://line.me/ti/p/pf0zYhi55P">LINE客服</a>

<script>

let seconds=0
setInterval(()=>{
seconds++
document.getElementById("stayTime").innerText="你已停留："+seconds+" 秒"
},1000)

const cards=document.querySelectorAll(".card")
const prices=document.querySelectorAll(".prices")

cards.forEach((card,i)=>{

card.onclick=function(){

cards.forEach(c=>c.classList.remove("active"))
card.classList.add("active")

prices.forEach(p=>p.style.display="none")

prices[i].style.display="block"

prices[i].scrollIntoView({
behavior:"smooth"
})

}

})

const search=document.getElementById("search")
const noResult=document.getElementById("noResult")

search.addEventListener("input",function(){

let text=this.value.toLowerCase()
let found=false

prices.forEach(p=>p.style.display="none")

cards.forEach(card=>{

let name=card.dataset.name.toLowerCase()

if(name.startsWith(text) || text===""){
card.style.display="block"
found=true
}else{
card.style.display="none"
}

})

noResult.style.display = found ? "none" : "block"

})

document.querySelectorAll(".price").forEach(item=>{

item.onclick=function(){

let game=this.closest(".prices").querySelector("h3").innerText
let itemName=this.children[0].innerText
let price=this.children[1].innerText

let text=`我要儲值\n遊戲:${game}\n面額:${itemName}\n價格:${price}`

let url="https://line.me/R/msg/text/?"+encodeURIComponent(text)

window.open(url)

alert("已幫你填好訂單內容")

}

})

</script>

</body>
</html>
