<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>

<style>

html{
scroll-behavior:smooth;
}

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

input{
width:85%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
outline:none;
transition:0.2s;
}

input:focus{
box-shadow:0 0 10px #3b82f6;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
color:black;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
transition:0.25s;
position:relative;
animation:fadeIn 0.8s ease;
}

.grid .card:nth-child(1){animation-delay:0.1s}
.grid .card:nth-child(2){animation-delay:0.2s}
.grid .card:nth-child(3){animation-delay:0.3s}
.grid .card:nth-child(4){animation-delay:0.4s}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(37,99,235,0.7);
}

.card.active{
outline:3px solid #3b82f6;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

.hot{
position:absolute;
background:#ef4444;
color:white;
font-size:12px;
padding:4px 8px;
border-radius:8px;
top:8px;
left:8px;
font-weight:bold;
}

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
animation:fadePrice 0.4s ease;
}

@keyframes fadePrice{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.price:hover{
background:#e2e8f0;
transform:scale(1.02);
}

.price span:last-child{
color:#2563eb;
}

.trust{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.trust div{
background:#1e293b;
padding:14px;
border-radius:10px;
font-size:14px;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:14px 22px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.top{
position:fixed;
bottom:90px;
right:20px;
background:#3b82f6;
color:white;
padding:12px 16px;
border-radius:50px;
text-decoration:none;
font-size:14px;
box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

.notice{
margin-top:20px;
color:#94a3b8;
}

.marquee{
width:100%;
background:linear-gradient(90deg,#2563eb,#4f46e5);
color:white;
padding:14px 0;
overflow:hidden;
white-space:nowrap;
font-size:16px;
font-weight:bold;
letter-spacing:1px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:marquee 16s linear infinite;
}

@keyframes marquee{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.no-result{
display:none;
margin-top:20px;
color:#94a3b8;
font-size:14px;
}

.counter{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

.online-count{
margin-top:8px;
font-size:13px;
color:#94a3b8;
}

.comment-box{
margin-top:40px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

.comment-input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

.comment-btn{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.comment{
background:#111827;
margin-top:10px;
padding:10px;
border-radius:8px;
font-size:14px;
text-align:left;
}

.comment-time{
font-size:11px;
color:#9ca3af;
margin-left:8px;
}

.like{
cursor:pointer;
font-size:12px;
color:#60a5fa;
margin-left:10px;
}

</style>

</head>

<body>

<a id="top"></a>

<div class="marquee">
<span>
🔥公告：代儲皆為人工儲值｜請準備遊戲UID｜價格每日浮動｜LINE客服24小時在線🔥
</span>
</div>

<header>

<h1>🎮 呼嚕嚕手遊代儲</h1>
<div class="subtitle">安全 · 快速 · 即時儲值</div>

<input id="search" placeholder="搜尋遊戲">

<div class="online-count" id="onlineCount"></div>

</header>

<div class="container">

<div class="grid" id="games">

<div class="card" data-name="原神">
<div class="hot">HOT</div>
<img src="https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg">
<div class="card-title">原神</div>
</div>

<div class="card" data-name="崩壞星穹鐵道">
<div class="hot">HOT</div>
<img src="https://upload.wikimedia.org/wikipedia/zh/1/11/Honkai%EF%BC%9AStar_Rail%E5%B4%A9%E5%A3%9E%EF%BC%9A%E6%98%9F%E7%A9%B9%E9%90%B5%E9%81%93.png">
<div class="card-title">崩壞星穹鐵道</div>
</div>

<div class="card" data-name="Apex">
<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1172470/header.jpg">
<div class="card-title">APEX</div>
</div>

<div class="card" data-name="LOL">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/League_of_Legends_2019_vector.svg">
<div class="card-title">LOL</div>
</div>

</div>

<div class="no-result" id="noResult">
找不到這個遊戲
</div>

<div class="counter" id="counter"></div>
<div class="counter" id="stayTime"></div>

<div class="comment-box">

<h3>💬 玩家留言</h3>

<input class="comment-input" id="name" placeholder="你的暱稱">
<input class="comment-input" id="message" placeholder="留言內容">

<button class="comment-btn" onclick="addComment()">送出留言</button>

<div id="commentList"></div>

</div>

</div>

<script>

let online=Math.floor(Math.random()*6)+2
document.getElementById("onlineCount").innerText="目前在線："+online+" 人"

let seconds=0
setInterval(()=>{
seconds++
document.getElementById("stayTime").innerText="你已停留："+seconds+" 秒"
},1000)

const badWords=["幹","靠","垃圾"]

function filterText(text){
badWords.forEach(word=>{
text=text.replaceAll(word,"***")
})
return text
}

function timeAgo(time){
let sec=Math.floor((Date.now()-time)/1000)
if(sec<60) return sec+"秒前"
if(sec<3600) return Math.floor(sec/60)+"分鐘前"
return Math.floor(sec/3600)+"小時前"
}

function addComment(){

let name=document.getElementById("name").value
let message=document.getElementById("message").value

if(!name||!message){
alert("請填寫完整")
return
}

message=filterText(message)

let comments=JSON.parse(localStorage.getItem("comments")||"[]")

comments.push({name,message,time:Date.now(),likes:0})

localStorage.setItem("comments",JSON.stringify(comments))

loadComments()

document.getElementById("message").value=""
}

function like(i){

let comments=JSON.parse(localStorage.getItem("comments")||"[]")

comments[i].likes++

localStorage.setItem("comments",JSON.stringify(comments))

loadComments()

}

function loadComments(){

let comments=JSON.parse(localStorage.getItem("comments")||"[]")

let html=""

comments.reverse().forEach((c,i)=>{

html+=`<div class="comment">
<b>${c.name}</b>
<span class="comment-time">${timeAgo(c.time)}</span>
<br>
${c.message}
<span class="like" onclick="like(${comments.length-1-i})">👍 ${c.likes}</span>
</div>`

})

document.getElementById("commentList").innerHTML=html

}

loadComments()

</script>

</body>
</html>
