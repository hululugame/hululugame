g.prices.forEach(p=>{

})

/* ---------- 停留秒數 ---------- */

seconds++

},1000)

/* ---------- 搜尋 ---------- */

const search=document.getElementById("search")
const noResult=document.getElementById("noResult")

search.addEventListener("input",function(){

let text=this.value.toLowerCase()
let found=false

document.querySelectorAll(".prices").forEach(p=>p.style.display="none")

document.querySelectorAll(".card").forEach(card=>{

let name=card.dataset.name.toLowerCase()

if(name.includes(text)||text===""){
card.style.display="block"
found=true
}else{
card.style.display="none"
}

})

noResult.style.display=found?"none":"block"

})

/* ---------- 卡片點擊 ---------- */

document.addEventListener("click",function(e){

if(e.target.closest(".card")){

let cards=document.querySelectorAll(".card")
let prices=document.querySelectorAll(".prices")

cards.forEach(c=>c.classList.remove("active"))

let card=e.target.closest(".card")
card.classList.add("active")

let index=[...cards].indexOf(card)

prices.forEach(p=>p.style.display="none")

prices[index].style.display="block"

prices[index].scrollIntoView({behavior:"smooth"})


}

})

/* ---------- LINE 訂單 ---------- */

let game=item.closest(".prices").querySelector("h3").innerText

/* ---------- 星空 + 煙火 + 流星 ---------- */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth*0.6
canvas.height=window.innerHeight*0.6

let stars=[]
let fireworks=[]
let meteors=[]

for(let i=0;i<35;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
alpha:Math.random()
})
}

function createFirework(x,y){

for(let i=0;i<12;i++){
fireworks.push({
x:x,
y:y,
dx:(Math.random()-0.5)*6,
dy:(Math.random()-0.5)*6,
life:80,
color:`hsl(${Math.random()*360},100%,60%)`
})
}

}

setInterval(()=>{
createFirework(Math.random()*canvas.width,Math.random()*canvas.height/2)
},1800)

canvas.addEventListener("click",e=>{
createFirework(e.clientX,e.clientY)
})

function createMeteor(){
meteors.push({
x:Math.random()*canvas.width,
y:-20,
dx:4,
dy:4,
life:80
})
}

setInterval(createMeteor,3000)

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* 星星 */

stars.forEach(s=>{

s.alpha+=(Math.random()-0.5)*0.05
if(s.alpha<0.1)s.alpha=0.1
if(s.alpha>1)s.alpha=1

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fillStyle=`rgba(255,255,255,${s.alpha})`
ctx.fill()

})

/* 煙火 */

fireworks.forEach((p,i)=>{

p.x+=p.dx
p.y+=p.dy
p.life--

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

if(p.life<=0){
fireworks.splice(i,1)
}

})

/* 流星 */

meteors.forEach((m,i)=>{

m.x+=m.dx
m.y+=m.dy
m.life--

ctx.beginPath()
ctx.moveTo(m.x,m.y)
ctx.lineTo(m.x-20,m.y-20)
ctx.strokeStyle="white"
ctx.stroke()

if(m.life<=0){
meteors.splice(i,1)
}

})

setTimeout(()=>{
requestAnimationFrame(animate)
},40)

}

setTimeout(()=>{
animate()
},800)

/* ---------- 現在時間 ---------- */

function updateTime(){

const now = new Date()

let h = now.getHours().toString().padStart(2,"0")
let m = now.getMinutes().toString().padStart(2,"0")
let s = now.getSeconds().toString().padStart(2,"0")

document.getElementById("nowTime").innerText =
"現在時間："+h+":"+m+":"+s

}

setInterval(updateTime,1000)
updateTime()

/* 防偷程式 */

// 禁止選取文字
document.onselectstart=function(){
return false;
};

// 禁止拖曳圖片
document.addEventListener("dragstart",function(e){
e.preventDefault();
});

// 禁止右鍵
document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

// 禁止 F12
document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="J"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="U"){
e.preventDefault();
}

});

// 偵測開發者工具

if(!/mobile/i.test(navigator.userAgent)){

setInterval(function(){

if(window.outerWidth - window.innerWidth > 200){
location.href="about:blank";
}

},1000);

}
