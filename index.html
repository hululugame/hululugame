<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

input{
width:85%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
color:black;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
}

.notice{
margin-top:20px;
color:#94a3b8;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:14px 22px;
border-radius:50px;
color:white;
text-decoration:none;
}

</style>

</head>


<body>

<header>

<h1>🎮 呼嚕嚕手遊代儲</h1>
<div class="subtitle">安全 · 快速 · 即時儲值</div>

<input id="search" placeholder="搜尋遊戲">

</header>


<div class="container">

<div class="grid" id="games">

<div class="card" data-key="原神 genshin yuanshen">

<img src="https://cdn.akamai.steamstatic.com/steam/apps/990080/header.jpg">

<div class="card-title">原神</div>

</div>


<div class="card" data-key="崩壞 崩鐵 星穹鐵道 honkai starrail">

<img src="https://cdn.akamai.steamstatic.com/steam/apps/1817070/header.jpg">

<div class="card-title">崩壞星穹鐵道</div>

</div>


<div class="card" data-key="apex apexlegends a">

<img src="https://cdn.akamai.steamstatic.com/steam/apps/1172470/header.jpg">

<div class="card-title">APEX</div>

</div>


<div class="card" data-key="lol leagueoflegends l 英雄聯盟">

<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ahri_0.jpg">

<div class="card-title">LOL</div>

</div>

</div>


<div class="prices" id="genshin">

<h3>原神</h3>

<div class="price"><span>60晶石</span><span>$30</span></div>
<div class="price"><span>300晶石</span><span>$140</span></div>
<div class="price"><span>980晶石</span><span>$400</span></div>

</div>


<div class="prices" id="starrail">

<h3>崩壞星穹鐵道</h3>

<div class="price"><span>60星瓊</span><span>$30</span></div>
<div class="price"><span>300星瓊</span><span>$140</span></div>

</div>


<div class="prices" id="apex">

<h3>APEX</h3>

<div class="price"><span>1000金幣</span><span>$220</span></div>
<div class="price"><span>2150金幣</span><span>$420</span></div>

</div>


<div class="prices" id="lol">

<h3>LOL</h3>

<div class="price"><span>375聯盟幣</span><span>$150</span></div>
<div class="price"><span>610聯盟幣</span><span>$230</span></div>

</div>


<div class="notice">
✨價格每日浮動，依照官方當天報價為主✨
</div>

</div>


<a class="line" href="https://line.me/ti/p/YOURID">LINE客服</a>



<script>

const cards=document.querySelectorAll(".card")
const prices=document.querySelectorAll(".prices")

cards.forEach((card,index)=>{

card.onclick=function(){

prices.forEach(p=>p.style.display="none")

prices[index].style.display="block"

}

})


const input=document.getElementById("search")

input.addEventListener("input",function(){

let text=input.value.toLowerCase()

prices.forEach(p=>p.style.display="none")

cards.forEach(card=>{

let keys=card.dataset.key.toLowerCase()

if(keys.includes(text) || text===""){
card.style.display="block"
}else{
card.style.display="none"
}

})

})

</script>

</body>
</html>
