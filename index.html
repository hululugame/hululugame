<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>е‘јеҡ•еҡ•жүӢйҒҠд»Је„І</title>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
padding-bottom:260px;
}

/* жҳҹз©әиғҢжҷҜ */

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* жЁҷйЎҢ */

header{
padding:40px 20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

/* жҗңе°Ӣ */

input{
width:85%;
padding:14px;
border-radius:12px;
border:none;
margin-top:20px;
font-size:16px;
}

/* еҚЎзүҮ */

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
cursor:pointer;
color:black;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

/* еғ№ж ј */

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.price span:last-child{
color:#2563eb;
}

/* дҝЎд»»еҚҖ */

.trust{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.trust div{
background:#1e293b;
padding:14px;
border-radius:10px;
}

/* е®ўжңҚ bubble */

.bubble{
position:fixed;
right:20px;
bottom:90px;
background:white;
color:black;
padding:12px 16px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
font-size:14px;
max-width:200px;
z-index:999;
}

/* е®ўжңҚжҢүйҲ• */

.support{
position:fixed;
right:20px;
bottom:30px;
z-index:999;
}

.support-btn{
width:60px;
height:60px;
background:#2563eb;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
animation: glow 2s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 0 rgba(37,99,235,0.4);}
50%{box-shadow:0 0 20px rgba(37,99,235,0.9);}
100%{box-shadow:0 0 0 rgba(37,99,235,0.4);}
}

.support-menu{
display:none;
flex-direction:column;
gap:10px;
margin-bottom:70px;
}

.support-menu a{
padding:12px 20px;
border-radius:25px;
color:white;
text-decoration:none;
font-weight:bold;
}

.support-line{
background:#22c55e;
}

.support-ig{
background:#ec4899;
}

.counter{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

.clock{
margin-top:10px;
font-size:13px;
color:#94a3b8;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>

<h1>рҹҢҹ е‘јеҡ•еҡ•жүӢйҒҠд»Је„І рҹҢҹ</h1>
<div class="subtitle">е®үе…Ё В· еҝ«йҖҹ В· дҫҝе®ң</div>

<input id="search" placeholder="жҗңе°ӢйҒҠжҲІ">

</header>

<div class="container">

<div class="grid" id="games"></div>

<div id="pricesArea"></div>

<div class="trust">
<div>вӯ• жӯЈиҰҸз®ЎйҒ“е„ІеҖј</div>
<div>вҡЎ дәәе·Ҙеҝ«йҖҹе„ІеҖј</div>
<div>рҹ”Ҙ ж°ёд№…е”®еҫҢжңҚеӢҷ</div>
<div>рҹҳҺ йӣ¶йҺ–зҺҮйӣ¶е°Ғиҷҹ</div>
</div>

<div class="counter" id="stayTime"></div>
<div class="clock" id="clock"></div>

</div>

<div class="bubble" id="bubble">
жӯЎиҝҺе…үиҮЁрҹҷӮ<br>
йңҖиҰҒе„ІеҖј<br>
й»һж“ҠйҖЈзөҗдёӢе–®рҹҢ№
</div>

<div class="support">

<div class="support-btn" onclick="toggleSupport()">рҹ’¬</div>

<div class="support-menu" id="supportMenu">
<a href="#" class="support-line">LINEе®ўжңҚ</a>
<a href="#" class="support-ig">IGе®ўжңҚ</a>
</div>

</div>

<script>

/* йҒҠжҲІиіҮж–ҷ */

const games=[
{
name:"еҺҹзҘһ",
img:"https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg",
prices:[
["60еүөдё–зөҗжҷ¶","$30"],
["300еүөдё–зөҗжҷ¶","$140"]
]
},
{
name:"еӮіиӘӘе°Қжұә",
img:"https://play-lh.googleusercontent.com/gEgKefzTO44lFUTsxyIqm0HPmFxNX4oxKpNeeklKNCOa9J6f9o4p8oBw4Oc-lYoRvO5-0svcu1uqBlbkpK_Q",
prices:[
["72й»һеҚ·","$50"],
["145й»һеҚ·","$97"]
]
}
]

const gameArea=document.getElementById("games")
const priceArea=document.getElementById("pricesArea")

games.forEach((g,i)=>{

gameArea.innerHTML+=`
<div class="card">
<img src="${g.img}">
<div class="card-title">${g.name}</div>
</div>
`

let html=`<div class="prices" id="price${i}">
<h3>${g.name}</h3>`

g.prices.forEach(p=>{
html+=`<div class="price"><span>${p[0]}</span><span>${p[1]}</span></div>`
})

html+=`</div>`

priceArea.innerHTML+=html

})

/* еҒңз•ҷжҷӮй–“ */

let seconds=0

setInterval(()=>{
seconds++
document.getElementById("stayTime").innerText="дҪ е·ІеҒңз•ҷпјҡ"+seconds+" з§’"
},1000)

/* зҸҫеңЁжҷӮй–“ */

setInterval(()=>{

const now=new Date()

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")
let s=String(now.getSeconds()).padStart(2,"0")

document.getElementById("clock").innerText="зҸҫеңЁжҷӮй–“пјҡ"+h+":"+m+":"+s

},1000)

/* е®ўжңҚ */

function toggleSupport(){

const menu=document.getElementById("supportMenu")

if(menu.style.display==="flex"){
menu.style.display="none"
}else{
menu.style.display="flex"
}

}

/* bubble иҮӘеӢ•ж¶ҲеӨұ */

setTimeout(()=>{

const bubble=document.getElementById("bubble")

bubble.style.opacity="0"

setTimeout(()=>{
bubble.style.display="none"
},500)

},5000)

</script>

</body>
</html>
