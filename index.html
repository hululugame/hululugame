<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>呼嚕嚕手遊代儲</title>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
color:#94a3b8;
margin-top:6px;
}

input{
width:85%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

.container{
max-width:750px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
color:black;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-title{
padding:12px;
font-weight:bold;
}

.prices{
display:none;
background:white;
color:black;
border-radius:14px;
margin-top:20px;
padding:20px;
}

.price{
display:flex;
justify-content:space-between;
background:#f1f5f9;
padding:14px;
margin:8px 0;
border-radius:10px;
}

.line{
position:fixed;
bottom:20px;
right:20px;
background:#06c755;
padding:14px 22px;
border-radius:50px;
color:white;
text-decoration:none;
}

.notice{
margin-top:20px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<h1>🎮 呼嚕嚕手遊代儲</h1>
<div class="subtitle">安全 · 快速 · 即時儲值</div>

<input id="search" placeholder="搜尋遊戲">

</header>

<div class="container">

<div class="grid" id="games">

<div class="card" data-name="原神">

<img src="https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg">

<div class="card-title">原神</div>

</div>

<div class="card" data-name="崩壞星穹鐵道">

<img src="https://upload.wikimedia.org/wikipedia/en/b/b5/Honkai_Star_Rail.png">

<div class="card-title">崩壞星穹鐵道</div>

</div>

<div class="card" data-name="Apex">

<img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1172470/header.jpg">

<div class="card-title">APEX</div>

</div>

<div class="card" data-name="LOL">

<img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/League_of_Legends_2019_vector.svg">

<div class="card-title">LOL</div>

</div>

</div>


<div class="notice">
✨價格每日浮動，依照官方當天報價為主✨
</div>

</div>


<a class="line" href="https://line.me/ti/p/YOURID">LINE客服</a>


<script>

const cards=document.querySelectorAll(".card")

document.getElementById("search").addEventListener("input",function(){

let text=this.value.toLowerCase()

cards.forEach(card=>{

let name=card.dataset.name.toLowerCase()

if(name.startsWith(text) || text===""){
card.style.display="block"
}else{
card.style.display="none"
}

})

})

</script>

</body>
</html>
