<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>遊戲價目查詢</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

input{
width:80%;
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

.game{
background:#222;
padding:15px;
margin:10px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>🎮 遊戲價目查詢</h1>

<input type="text" id="search" placeholder="輸入遊戲名稱">

<div id="games">

<div class="game">
原神<br>
60結晶 $30<br>
300結晶 $140<br>
980結晶 $400<br>
1980結晶 760<br>
3280結晶 $1350<br>
6480結晶 $2170<br>
🌟價格每日浮動，依照官方當天報價為主🌟
</div>



</div>

<script>
let input=document.getElementById("search")
let games=document.getElementsByClassName("game")

input.onkeyup=function(){
let text=input.value.toLowerCase()

for(let i=0;i<games.length;i++){
let name=games[i].innerText.toLowerCase()

if(name.includes(text)){
games[i].style.display="block"
}else{
games[i].style.display="none"
}
}
}
</script>

</body>
</html>
